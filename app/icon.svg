  <!-- Bold oblique geometric "E" with sharp angled arm tips -->
  <g fill="#ECE81A" transform="translate(32 32) skewX(-9) translate(-32 -32)">
    <!-- spine -->
    <rect x="22" y="17" width="7" height="30"/>
    <!-- top arm -->
    <polygon points="22,17 43,17 43,20.5 39.5,23.5 22,23.5"/>
    <!-- middle arm (shorter) -->
    <polygon points="22,28.75 38,28.75 38,32 34.5,35.25 22,35.25"/>
    <!-- bottom arm -->
    <polygon points="22,40.5 39.5,40.5 43,44 43,47 22,47"/>
  </g>
</svg>
