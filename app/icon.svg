<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Volt edge -->
  <polygon points="11,2 62,2 62,53 53,62 2,62 2,11" fill="#ECE81A"/>
  <!-- Black tactical panel (angled top-left + bottom-right cuts) -->
